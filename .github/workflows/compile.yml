name: Wanadi Chasqui Compilation & Test
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  rust-check-and-test:
    name: Rust Code Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: swatinem/rust-cache@v2
      - run: cargo check --workspace
      - run: cargo test --workspace

  build-android-apk:
    name: Build Android APK (Release)
    runs-on: ubuntu-latest
    needs: rust-check-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Accept licenses and install SDK 36 + NDK
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-36" "build-tools;34.0.0" "ndk;26.1.10909125"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: stable
          cache: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Flutter pub get
        run: cd 07-flutter-app && flutter pub get

      - name: Build split APKs
        run: cd 07-flutter-app && flutter build apk --release --split-per-abi

      - name: Upload arm64-v8a
        uses: actions/upload-artifact@v4
        with:
          name: wanadi-chasqui-arm64-v8a-release-apk
          path: 07-flutter-app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Upload armeabi-v7a
        uses: actions/upload-artifact@v4
        with:
          name: wanadi-chasqui-armeabi-v7a-release-apk
          path: 07-flutter-app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
